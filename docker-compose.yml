version: '3.8'

services:
  # MySQL Database
  mysql:
    image: mysql:8.0
    container_name: qpr_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-BrikienlabsL@12}
      MYSQL_DATABASE: ${DB_NAME:-PVBL}
      MYSQL_USER: ${DB_USER:-abhay}
      MYSQL_PASSWORD: ${DB_PASSWORD:-BrikienlabsL@12}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./config/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    #ports:
      #- "127.0.0.1:${MYSQL_PORT:-32306}:3306"
    networks:
      - qpr_network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-BrikienlabsL@12}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Node.js Application
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: qpr_app
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DB_HOST: mysql
      DB_USER: ${DB_USER:-abhay}
      DB_PASSWORD: ${DB_PASSWORD:-BrikienlabsL@12}
      DB_NAME: ${DB_NAME:-PVBL}
      DB_PORT: 3306
      JWT_SECRET: ${JWT_SECRET}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      PROTOCOL: ${PROTOCOL:-http}
      DOMAIN: ${DOMAIN:-localhost}
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    #ports:
      #- "${APP_PORT:-55516}:3000"
    networks:
      - qpr_network
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/health', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Nginx (Optional - for HTTPS in future)
  nginx:
    image: nginx:alpine
    container_name: qpr_nginx
    restart: unless-stopped
    ports:
      #- "${HTTP_PORT:-80}:80"
      #- "${HTTPS_PORT:-443}:443"
       - "127.0.0.1:55516:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - qpr_network
    depends_on:
      - app
    profiles:
      - with-nginx

networks:
  qpr_network:
    driver: bridge

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local
