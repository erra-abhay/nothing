services:
  # MySQL Database (Optimized for High Concurrency)
  mysql:
    image: mysql:8.0
    container_name: qpr_mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-admin123}
      MYSQL_DATABASE: ${DB_NAME:-PVBL}
      MYSQL_USER: ${DB_USER:-abhay}
      MYSQL_PASSWORD: ${DB_PASSWORD:-admin123}
      TZ: Asia/Kolkata
    volumes:
      - mysql_data:/var/lib/mysql
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - qpr_network
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    deploy:
      resources:
        limits:
          memory: 1G
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${DB_PASSWORD:-admin123}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Redis Stack (for RediSearch)
  redis:
    image: redis/redis-stack:latest
    container_name: qpr_redis_stack
    restart: unless-stopped
    networks:
      - qpr_network
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Next.js Application (SCALABLE Production Build)
  app:
    build:
      context: .
      dockerfile: Dockerfile
    # No container_name here to allow: docker compose up -d --scale app=X
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-production}
      PORT: ${PORT:-3000}
      DB_HOST: mysql
      DB_USER: ${DB_USER:-abhay}
      DB_PASSWORD: ${DB_PASSWORD:-BrikienlabsL@12}
      DB_NAME: ${DB_NAME:-PVBL}
      DB_PORT: 3306
      REDIS_URL: redis://redis:6379
      JWT_SECRET: ${JWT_SECRET}
      MAX_FILE_SIZE: ${MAX_FILE_SIZE:-10485760}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-*}
      PROTOCOL: ${PROTOCOL:-http}
      DOMAIN: ${DOMAIN:-localhost}
      TZ: Asia/Kolkata
      HOSTNAME: 0.0.0.0
      NEXT_TELEMETRY_DISABLED: 1
    volumes:
      - uploads_data:/app/uploads
      - logs_data:/app/logs
    networks:
      - qpr_network
    depends_on:
      mysql:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/public/papers', (r) => {process.exit(r.statusCode === 200 ? 0 : 1)})"]
      interval: 30s
      timeout: 5s
      retries: 3

  # Nginx (Secure Internal Entry Point)
  nginx:
    image: nginx:alpine
    container_name: qpr_nginx
    restart: unless-stopped
    ports:
      - "127.0.0.1:55516:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - qpr_network
    depends_on:
      - app
    profiles:
      - with-nginx
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  # Prometheus (Metrics Aggregation)
  prometheus:
    image: prom/prometheus:latest
    container_name: qpr_prometheus
    restart: unless-stopped
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
    ports:
      - "9090:9090"
    networks:
      - qpr_network
    profiles:
      - monitoring

  # Grafana (Metrics Visualization Dashboard)
  grafana:
    image: grafana/grafana:latest
    container_name: qpr_grafana
    restart: unless-stopped
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3001:3000"
    networks:
      - qpr_network
    profiles:
      - monitoring

  # cAdvisor (Container Resource Usage Scraper)
  cadvisor:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: qpr_cadvisor
    restart: unless-stopped
    privileged: true
    devices:
      - /dev/kmsg
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    networks:
      - qpr_network
    profiles:
      - monitoring

  # Node Exporter (Host Metrics Scraper)
  node-exporter:
    image: prom/node-exporter:latest
    container_name: qpr_node_exporter
    restart: unless-stopped
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "9100:9100"
    networks:
      - qpr_network
    profiles:
      - monitoring

networks:
  qpr_network:
    name: qpr_network
    driver: bridge

volumes:
  mysql_data:
    driver: local
  uploads_data:
    driver: local
  logs_data:
    driver: local
  prometheus_data:
    driver: local
  grafana_data:
    driver: local
