apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: uploads-pvc
  namespace: papervault
spec:
  accessModes:
    - ReadWriteMany
  storageClassName: microk8s-hostpath
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: papervault-app
  namespace: papervault
spec:
  replicas: 2
  selector:
    matchLabels:
      app: papervault-app
  template:
    metadata:
      labels:
        app: papervault-app
    spec:
      containers:
      - name: app
        image: localhost:32000/papervault-nextjs:latest
        imagePullPolicy: Always
        envFrom:
        - configMapRef:
            name: papervault-config
        env:
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: papervault-secrets
              key: DB_PASSWORD
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: papervault-secrets
              key: JWT_SECRET
        - name: DATABASE_URL
          value: mysql://$(DB_USER):$(DB_PASSWORD)@$(DB_HOST):$(DB_PORT)/$(DB_NAME)
        ports:
        - containerPort: 3000
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        volumeMounts:
        - name: uploads-volume
          mountPath: /app/uploads
      volumes:
      - name: uploads-volume
        persistentVolumeClaim:
          claimName: uploads-pvc
---
apiVersion: v1
kind: Service
metadata:
  name: papervault-service
  namespace: papervault
spec:
  type: ClusterIP
  ports:
  - port: 80
    targetPort: 3000
  selector:
    app: papervault-app
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: papervault-hpa
  namespace: papervault
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: papervault-app
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70
  - type: Resource
    resource:
      name: memory
      target:
        type: Utilization
        averageUtilization: 80
